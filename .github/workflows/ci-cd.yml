name: SIMS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET Build & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      # Cache NuGet packages
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}

      - name: Restore dependencies
        run: dotnet restore backend/SIMS.Backend.csproj

      - name: Build (Release)
        run: dotnet build backend/SIMS.Backend.csproj --configuration Release --no-restore

      - name: Run tests
        run: dotnet test backend/SIMS.Backend.csproj --configuration Release --no-build --verbosity normal


  frontend:
    name: Frontend (React/Node Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Cache npm manually (extra safety)
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('frontend/package-lock.json') }}

      - name: Install dependencies (CI mode)
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build


  quality-gate:
    name: Quality Gate (CI validation)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: CI Success marker
        run: echo "All builds passed successfully"
