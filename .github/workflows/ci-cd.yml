name: SIMS CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (.NET Build & Test)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.x

      # Cache NuGet packages automatically with setup-dotnet if possible, 
      # or use explicit cache.
      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Backend/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore Backend/Backend.sln

      - name: Build (Release)
        run: dotnet build Backend/Backend.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test Backend/Backend.sln --configuration Release --no-build --verbosity normal


  frontend:
    name: Frontend (React/Node Build)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm install

      - name: Build frontend (production)
        working-directory: ./frontend
        run: npm run build


  quality-gate:
    name: Quality Gate (CI validation)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - name: CI Success marker
        run: echo "All builds passed successfully"
